<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade - CocoRoot</title>
    <link rel="stylesheet" href="../css/wireframe.css">
</head>

<body class="app-page">


    <div class="page-content">
        <div class="page-title">Rede de Agricultores</div>

        <div id="community-error" class="dash-card" style="margin-bottom:16px;color:#8a1f11;" hidden></div>

        <div id="community-stats" class="stats-row" aria-label="Estatísticas"></div>

        <div class="tabs" role="tablist" aria-label="Categorias">
            <button class="tab active" type="button" data-cat="todos">Todos</button>
            <button class="tab" type="button" data-cat="duvidas">Dúvidas</button>
            <button class="tab" type="button" data-cat="dicas">Dicas</button>
            <button class="tab" type="button" data-cat="experiencias">Experiências</button>
        </div>

        <div id="posts" style="display:flex;flex-direction:column;gap:12px;"></div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/comunidade.js"></script>
    <script src="../js/layout.js"></script>
</body>

</html>
