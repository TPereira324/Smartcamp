<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CocoRoot</title>
    <link rel="stylesheet" href="../css/cocoroot.css">
</head>

<body class="auth-page">
    <div class="auth-img">
        <a href="#" id="register-back" class="auth-back" aria-label="Voltar"><i class="bi bi-chevron-left"
                aria-hidden="true"></i></a>
    </div>

    <div class="auth-form">
        <div class="auth-form-card">
            <div class="auth-form-header">
                <img src="../image/logo.jpeg" alt="CocoRoot" class="auth-brand">
            </div>

            <form id="register-form" action="#" method="POST">
                <div class="register-step" id="step-1">
                    <div class="form-group">
                        <label for="fullname">Digite o seu nome completo</label>
                        <div class="auth-row">
                            <input type="text" id="fullname" name="fullname" placeholder="Ex: Maria Viegas" required>
                            <button type="button" class="auth-next next-step" aria-label="Próximo">
                                <i class="bi bi-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="auth-progress" style="--p: 16.6%;">
                            <div class="auth-progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="register-step hidden" id="step-2">
                    <div class="form-group">
                        <label for="email">Digite o seu e-mail</label>
                        <div class="auth-row">
                            <input type="email" id="email" name="email" placeholder="Ex: maria123@gmail.com" required>
                            <button type="button" class="auth-next next-step" aria-label="Próximo">
                                <i class="bi bi-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="auth-progress" style="--p: 33.3%;">
                            <div class="auth-progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="register-step hidden" id="step-3">
                    <div class="form-group">
                        <label for="phone">Digite o seu número de telefone</label>
                        <input type="hidden" id="country_code" name="country_code" value="+351">
                        <div class="auth-row">
                            <input type="tel" id="phone" name="phone" placeholder="Ex: 912345678" inputmode="numeric"
                                required pattern="^[0-9]{9}$" title="O número deve ter exatamente 9 dígitos.">
                            <button type="button" class="auth-next next-step" aria-label="Próximo">
                                <i class="bi bi-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="auth-progress" style="--p: 50%;">
                            <div class="auth-progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="register-step hidden" id="step-4">
                    <div class="form-group">
                        <label for="farm_name">Digite o nome da sua fazenda</label>
                        <div class="auth-row">
                            <input type="text" id="farm_name" name="farm_name" placeholder="Ex: Quinta do Vale"
                                required>
                            <button type="button" class="auth-next next-step" aria-label="Próximo">
                                <i class="bi bi-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="auth-progress" style="--p: 66.6%;">
                            <div class="auth-progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="register-step hidden" id="step-5">
                    <div class="form-group">
                        <label for="password">Digite a sua palavra-passe</label>
                        <div class="auth-row">
                            <div class="input-wrap">
                                <input type="password" id="password" name="password" placeholder="********" required>
                                <button type="button" id="toggle-register-password" class="input-icon"
                                    aria-label="Mostrar ou ocultar palavra-passe">
                                    <i class="bi bi-eye" aria-hidden="true"></i>
                                </button>
                            </div>
                            <button type="button" class="auth-next next-step" aria-label="Próximo">
                                <i class="bi bi-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="auth-progress" style="--p: 83.3%;">
                            <div class="auth-progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="register-step hidden" id="step-6">
                    <div class="form-group">
                        <label for="confirm_password">Confirme a sua palavra-passe</label>
                        <div class="input-wrap">
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="********"
                                required>
                            <button type="button" id="toggle-register-confirm-password" class="input-icon"
                                aria-label="Mostrar ou ocultar confirmação da palavra-passe">
                                <i class="bi bi-eye" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="auth-progress" style="--p: 100%;">
                            <div class="auth-progress-fill"></div>
                        </div>
                    </div>
                    <div class="auth-submit">
                        <button type="submit" class="btn full">Registar-me</button>
                    </div>
                </div>
            </form>
        </div>

        <script src="../js/utils/config.js"></script>
        <script src="../js/utils/api.js"></script>
        <script src="../js/models/utilizadorModel.js"></script>
        <script src="../js/views/utilizadorView.js"></script>
        <script src="../js/controllers/utilizadorController.js"></script>
        <script src="../js/controllers/load.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const backBtn = document.getElementById('register-back');
                const registerForm = document.getElementById('register-form');
                const regPasswordInput = document.getElementById('password');
                const regConfirmPasswordInput = document.getElementById('confirm_password');
                const toggleRegPasswordBtn = document.getElementById('toggle-register-password');
                const toggleRegConfirmPasswordBtn = document.getElementById('toggle-register-confirm-password');

                if (registerForm && window.CocoRootApi) {
                    registerForm.action = window.CocoRootApi.buildBackendUrl('usuarios/registar');
                }

                if (backBtn) {
                    backBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const controller = window.CocoRootRegister && window.CocoRootRegister.controller;
                        if (controller && controller.currentStep && controller.currentStep > 1) {
                            controller.prevStep();
                        } else {
                            window.location.href = 'welcomeScreen.html';
                        }
                    });
                }

                document.addEventListener('keydown', (e) => {
                    if (e.key !== 'Enter') return;
                    const controller = window.CocoRootRegister && window.CocoRootRegister.controller;
                    if (!controller || controller.currentStep >= controller.maxStep) return;
                    const btn = document.querySelector(`#step-${controller.currentStep} .next-step`);
                    if (!btn) return;
                    e.preventDefault();
                    btn.click();
                });

                if (toggleRegPasswordBtn && regPasswordInput) {
                    toggleRegPasswordBtn.addEventListener('click', () => {
                        const isHidden = regPasswordInput.type === 'password';
                        regPasswordInput.type = isHidden ? 'text' : 'password';
                        const icon = toggleRegPasswordBtn.querySelector('i');
                        if (icon) {
                            icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
                        }
                    });
                }

                if (toggleRegConfirmPasswordBtn && regConfirmPasswordInput) {
                    toggleRegConfirmPasswordBtn.addEventListener('click', () => {
                        const isHidden = regConfirmPasswordInput.type === 'password';
                        regConfirmPasswordInput.type = isHidden ? 'text' : 'password';
                        const icon = toggleRegConfirmPasswordBtn.querySelector('i');
                        if (icon) {
                            icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
                        }
                    });
                }
            });
        </script>
        <script src="../js/views/layout.js"></script>
</body>

</html>
