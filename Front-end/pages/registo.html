<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - CocoRoot</title>
    <link rel="stylesheet" href="../css/wireframe.css">
</head>
<body class="auth-page">
    <div class="auth-img img-ph" style="overflow:hidden;padding:0;">
        
    </div>

    <div class="auth-form">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;">
            <a href="principal.html" class="back-link">← Home</a>
            <a href="login.html" class="nav-btn">Entrar</a>
        </div>

        <div class="auth-logo">
            <span style="display:flex;align-items:center;gap:10px;">
                
                <span>CocoRoot</span>
            </span>
        </div>

        <form id="register-form" action="http://localhost/Back-end/registrar.php" method="POST">
            <div class="register-step" id="step-1">
                <div class="form-group">
                    <label for="fullname">Nome completo</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Digite o seu nome completo" required>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn full next-step">Próximo</button>
                    <a href="welcomeScreen.html" class="btn full">Voltar</a>
                </div>
            </div>

            <div class="register-step hidden" id="step-2">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite o seu e-mail" required>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn full next-step">Próximo</button>
                    <button type="button" class="btn full prev-step">Anterior</button>
                </div>
            </div>

            <div class="register-step hidden" id="step-3">
                <div class="form-group">
                    <label for="country_code">Região / Código do país</label>
                    <select id="country_code" name="country_code" class="btn" style="width:100%;text-align:left;letter-spacing:1px;text-transform:none;font-weight:bold;" required>
                        <option value="" selected>Seleciona…</option>
                        <option value="+244">Angola (+244)</option>
                        <option value="+55">Brasil (+55)</option>
                        <option value="+258">Moçambique (+258)</option>
                        <option value="+351">Portugal (+351)</option>
                        <option value="+27">África do Sul (+27)</option>
                    </select>
                    <small id="country-error" style="color:red;display:none;">Selecione o código do país.</small>
                </div>
                <div class="form-group">
                    <label for="phone">Número de telefone (9 dígitos)</label>
                    <input type="tel" id="phone" name="phone" placeholder="Ex: 912345678" inputmode="numeric" required pattern="^[0-9]{9}$" title="O número deve ter exatamente 9 dígitos.">
                    <small id="phone-error" style="color:red;display:none;">Número inválido. Deve ter exatamente 9 dígitos.</small>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn full next-step">Próximo</button>
                    <button type="button" class="btn full prev-step">Anterior</button>
                </div>
            </div>

            <div class="register-step hidden" id="step-4">
                <div class="form-group">
                    <label for="farm_name">Nome da sua fazenda</label>
                    <input type="text" id="farm_name" name="farm_name" placeholder="Digite o nome da sua fazenda" required>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn full next-step">Próximo</button>
                    <button type="button" class="btn full prev-step">Anterior</button>
                </div>
            </div>

            <div class="register-step hidden" id="step-5">
                <div class="form-group">
                    <label for="password">Palavra-passe</label>
                    <input type="password" id="password" name="password" placeholder="Crie uma palavra-passe" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirmar palavra-passe</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirme a sua palavra-passe" required>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn full">Finalizar Registo</button>
                    <button type="button" class="btn full prev-step">Anterior</button>
                </div>
            </div>
        </form>

    <script src="../js/models/utilizadorModel.js"></script>
    <script src="../js/views/utilizadorView.js"></script>
    <script src="../js/controllers/utilizadorController.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const countryCode = document.getElementById('country_code');
            const countryError = document.getElementById('country-error');
            const phoneInput = document.getElementById('phone');
            const phoneError = document.getElementById('phone-error');
            const nextBtn = document.querySelector('#step-3 .next-step');

            if (nextBtn && phoneInput && countryCode) {
                nextBtn.addEventListener('click', (e) => {
                    const phone = (phoneInput.value || '').trim();
                    const code = (countryCode.value || '').trim();
                    const validPhonePattern = /^[0-9]{9}$/;

                    if (!code) {
                        e.preventDefault();
                        e.stopPropagation();
                        if (countryError) countryError.style.display = 'block';
                        countryCode.style.borderColor = 'red';
                        countryCode.focus();
                        return false;
                    }

                    if (!validPhonePattern.test(phone)) {
                        e.preventDefault();
                        e.stopPropagation();
                        if (phoneError) phoneError.style.display = 'block';
                        phoneInput.style.borderColor = 'red';
                        return false;
                    } else {
                        if (phoneError) phoneError.style.display = 'none';
                        phoneInput.style.borderColor = '';
                        if (countryError) countryError.style.display = 'none';
                        countryCode.style.borderColor = '';
                    }
                });
            }

            if (phoneInput) {
                phoneInput.addEventListener('input', () => {
                    if (phoneError) phoneError.style.display = 'none';
                    phoneInput.style.borderColor = '';
                });
            }
            if (countryCode) {
                countryCode.addEventListener('change', () => {
                    if (countryError) countryError.style.display = 'none';
                    countryCode.style.borderColor = '';
                });
            }
        });
    </script>
    <script src="../js/load.js"></script>
<script src="../js/layout.js"></script>
</body>
</html>
