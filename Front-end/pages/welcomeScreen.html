<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boas-vindas - CocoRoot</title>
    <link rel="stylesheet" href="../css/cocoroot.css">
</head>

<body class="auth-page">
    <div class="auth-img">
        <a href="principal.html" class="auth-back" aria-label="Voltar">&#8249;</a>
    </div>

    <div class="auth-form">
        <div class="auth-panel">
            <div class="auth-logo">
                <img src="../image/logo.jpeg" alt="CocoRoot" class="auth-brand">
            </div>

            <div class="auth-copy">
                <h1 class="auth-title">Gestão inteligente para os seus cultivos</h1>
                <ul class="auth-points">
                    <li>Monitorize as suas culturas em tempo real</li>
                    <li>Receba alertas e dicas personalizadas</li>
                    <li>Aprenda com outros agricultores</li>
                </ul>
            </div>

            <div class="btn-group">
                <a href="login.html" class="btn full">Entrar</a>
                <a href="registo.html" class="btn outline full">Registar-me</a>
            </div>
        </div>
    </div>
    <script src="../js/layout.js"></script>
</body>

</html>
