<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CocoRoot</title>
    <link rel="stylesheet" href="../css/cocoroot.css">
</head>

<body class="app-page">


    <div class="page-content">
        <div class="dash-header">
            <div>
                <div class="dash-hello">Olá, <span id="dashboard-user-name">utilizador</span>!</div>
                <div id="dashboard-greeting-text" class="dash-sub">A carregar dados do servidor...</div>
            </div>
            <div class="dash-actions">
                <a href="comecar.html" class="btn sm">Começar do Zero</a>
                <a href="noticias.html" class="btn sm">Ver Notícias</a>
            </div>
        </div>

        <div id="dashboard-error" class="dash-card" style="margin-bottom:16px;color:#8a1f11;" hidden></div>

        <div class="dash-stats-grid">
            <div class="dash-card">
                <div class="dash-card-title">Parcelas</div>
                <div id="dashboard-parcelas-count" class="dash-value">0</div>
            </div>
            <div class="dash-card">
                <div class="dash-card-title">Tarefas</div>
                <div id="dashboard-tarefas-count" class="dash-value">0</div>
            </div>
            <div class="dash-card">
                <div class="dash-card-title">Alertas</div>
                <div id="dashboard-alertas-count" class="dash-value">0</div>
            </div>
        </div>

        <div class="tabs" role="tablist" aria-label="Dashboard">
            <button class="tab active" type="button" data-tab="parcelas">Parcelas</button>
            <button class="tab" type="button" data-tab="tarefas">Tarefas</button>
            <button class="tab" type="button" data-tab="monitorizacao">Monitoramento</button>
            <button class="tab" type="button" data-tab="clima">Clima</button>
        </div>

        <section data-panel="parcelas">
            <div id="dashboard-parcelas-list"
                class="grid-auto" style="margin-bottom:16px;">
            </div>
            <div>
                <a href="registrar-cultivo.html" class="btn">Registrar Cultivo</a>
            </div>
        </section>

        <section data-panel="tarefas" hidden>
            <div class="dash-card" style="margin-bottom:14px;">
                <div class="dash-card-title">Hoje</div>
                <div id="dashboard-tarefas-list" class="stack"></div>
            </div>
        </section>

        <section data-panel="monitorizacao" hidden>
            <div id="dashboard-monitorizacao" class="panel-grid"></div>
        </section>

        <section data-panel="clima" hidden>
            <div id="dashboard-clima" class="panel-grid"></div>
        </section>

    </div>

    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>
        (function () {
            const tabs = Array.from(document.querySelectorAll('.tab[data-tab]'));
            const panels = Array.from(document.querySelectorAll('[data-panel]'));
            function setActive(name) {
                tabs.forEach((t) => t.classList.toggle('active', t.dataset.tab === name));
                panels.forEach((p) => {
                    const isActive = p.dataset.panel === name;
                    if (isActive) p.removeAttribute('hidden');
                    else p.setAttribute('hidden', '');
                });
            }
            tabs.forEach((t) => t.addEventListener('click', () => setActive(t.dataset.tab)));
            setActive('parcelas');
        })();
    </script>
    <script src="../js/layout.js"></script>
</body>

</html>
