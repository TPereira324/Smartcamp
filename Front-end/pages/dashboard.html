<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CocoRoot</title>
    <link rel="stylesheet" href="../css/wireframe.css">
</head>

<body class="app-page">


    <div class="page-content">
        <div
            style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px;">
            <div>
                <div style="font-size:28px;font-weight:900;letter-spacing:-0.4px;">Olá, <span
                        id="dashboard-user-name">utilizador</span>!</div>
                <div id="dashboard-greeting-text" style="color:var(--muted);margin-top:6px;">A carregar dados do
                    servidor...</div>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <a href="comecar.html" class="btn" style="padding:10px 16px;">Começar do Zero</a>
                <a href="noticias.html" class="btn" style="padding:10px 16px;">Ver Notícias</a>
            </div>
        </div>

        <div id="dashboard-error" class="dash-card" style="margin-bottom:16px;color:#8a1f11;" hidden></div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:22px;">
            <div class="dash-card">
                <div class="dash-card-title">Parcelas</div>
                <div id="dashboard-parcelas-count" style="font-size:28px;font-weight:900;line-height:1;">0</div>
                <div style="color:var(--muted);margin-top:6px;">na base de dados</div>
            </div>
            <div class="dash-card">
                <div class="dash-card-title">Tarefas</div>
                <div id="dashboard-tarefas-count" style="font-size:28px;font-weight:900;line-height:1;">0</div>
                <div style="color:var(--muted);margin-top:6px;">carregadas do servidor</div>
            </div>
            <div class="dash-card">
                <div class="dash-card-title">Alertas</div>
                <div id="dashboard-alertas-count" style="font-size:28px;font-weight:900;line-height:1;">0</div>
                <div style="color:var(--muted);margin-top:6px;">vindos da API</div>
            </div>
        </div>

        <div class="tabs" role="tablist" aria-label="Dashboard">
            <button class="tab active" type="button" data-tab="parcelas">Parcelas</button>
            <button class="tab" type="button" data-tab="tarefas">Tarefas</button>
            <button class="tab" type="button" data-tab="monitorizacao">Monitorização</button>
            <button class="tab" type="button" data-tab="clima">Clima</button>
        </div>

        <section data-panel="parcelas">
            <div id="dashboard-parcelas-list"
                style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:16px;">
            </div>
            <div style="display:flex;justify-content:flex-start;">
                <a href="registrar-cultivo.html" class="btn">Registar Cultivo</a>
            </div>
        </section>

        <section data-panel="tarefas" hidden>
            <div class="dash-card" style="margin-bottom:14px;">
                <div class="dash-card-title">Hoje</div>
                <div id="dashboard-tarefas-list" style="display:flex;flex-direction:column;gap:10px;"></div>
            </div>
        </section>

        <section data-panel="monitorizacao" hidden>
            <div id="dashboard-monitorizacao" style="display:grid;grid-template-columns:1fr;gap:14px;"></div>
        </section>

        <section data-panel="clima" hidden>
            <div id="dashboard-clima" style="display:grid;grid-template-columns:1fr;gap:14px;"></div>
        </section>

    </div>

    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>
        (function () {
            const tabs = Array.from(document.querySelectorAll('.tab[data-tab]'));
            const panels = Array.from(document.querySelectorAll('[data-panel]'));
            function setActive(name) {
                tabs.forEach((t) => t.classList.toggle('active', t.dataset.tab === name));
                panels.forEach((p) => {
                    const isActive = p.dataset.panel === name;
                    if (isActive) p.removeAttribute('hidden');
                    else p.setAttribute('hidden', '');
                });
            }
            tabs.forEach((t) => t.addEventListener('click', () => setActive(t.dataset.tab)));
            setActive('parcelas');
        })();
    </script>
    <script src="../js/layout.js"></script>
</body>

</html>
