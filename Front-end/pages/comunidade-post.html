<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Comunidade - CocoRoot</title>
    <link rel="stylesheet" href="../css/wireframe.css">
</head>

<body class="app-page">


    <div class="page-content" style="max-width:820px;">
        <div style="margin-bottom:18px;">
            <a href="comunidade.html" class="back-link">← Voltar</a>
        </div>

        <div id="community-post-error" class="dash-card" style="margin-bottom:16px;color:#8a1f11;" hidden></div>

        <div
            style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px;">
            <div id="c-meta" style="color:var(--muted);font-weight:800;">Anno · 14:45</div>
            <div id="c-badge" class="post-badge">Dica</div>
        </div>

        <h1 id="c-title" style="font-size:30px;letter-spacing:-0.6px;line-height:1.15;margin-bottom:12px;">Dica rápida
            para drenagem</h1>
        <div id="c-body" style="color:rgba(27,27,27,0.82);line-height:1.75;margin-bottom:22px;">
            Se a água fica acumulada, ajusta o escoamento antes de aumentar a rega. Pequenas mudanças na drenagem ajudam
            a manter a humidade estável.
        </div>

        <div class="comments-section">
            <div class="comment-title">Respostas</div>
            <div id="community-comments"></div>
        </div>

        <div style="margin-top:22px;">
            <div class="comment-title">Escreve Resposta</div>
            <form id="community-comment-form">
                <div class="form-group">
                    <textarea id="community-comment-input" rows="4" placeholder="Escreve aqui..."
                        style="resize:vertical;"></textarea>
                </div>
                <div style="display:flex;justify-content:flex-end;">
                    <button class="btn" type="submit">Enviar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/comunidadePost.js"></script>
    <script src="../js/layout.js"></script>
</body>

</html>
