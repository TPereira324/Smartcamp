<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login - CocoRoot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha384-+ZkQdZ5l9QyCkzqg2eXfS6jZVnQmQO3ZC7pCkHn+L5qZf2mY0Gv3vYVxwT3q3Q8VZ" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-body">
    <div id="app">
        <div class="welcome-container">
            <div class="welcome-image">
                <a href="#" class="back-arrow"
                    onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='../index.html'; } return false;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white"
                        class="bi bi-arrow-left-short" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5" />
                    </svg>
                </a>
                <img src="../image/Coco.jpeg" alt="Coconuts">
            </div>
            <div class="welcome-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <img src="../image/logo.jpeg" alt="CocoRoot Logo">
                    </div>
                    <h1 class="brand-name">CocoRoot</h1>
                </div>

                <form id="login-form" class="login-form" action="principal.html">
                    <div class="input-group">
                        <label for="email">Nome e e-mail</label>
                        <input type="email" id="email" name="email" placeholder="Digite o seu nome e e-mail" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Palavra-passe</label>
                        <input type="password" id="password" name="password" placeholder="Digite a sua palavra-passe"
                            required>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn-primary">Entrar</button>
                        <button type="button" class="btn-secondary"
                            onclick="location.href='../pages/registo.html'">Registar-me</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
