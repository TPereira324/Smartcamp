<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - CocoRoot</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="app">
        <div class="welcome-container">
            <div class="welcome-image">
                <img src="../image/Coco.jpeg" alt="Coconuts">
            </div>
            <div class="welcome-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <img src="../image/logo.jpeg" alt="CocoRoot Logo">
                    </div>
                    <h1 class="brand-name">CocoRoot</h1>
                </div>
                
                <form id="login-form" class="login-form">
                    <div class="input-group">
                        <label for="email">Nome e e-mail</label>
                        <input type="email" id="email" name="email" placeholder="Digite o seu nome e e-mail" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Palavra-passe</label>
                        <input type="password" id="password" name="password" placeholder="Digite a sua palavra-passe" required>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn-primary">Entrar</button>
                        <button type="button" class="btn-secondary" onclick="location.href='../pages/registo.html'">Registar-me</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
