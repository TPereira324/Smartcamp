<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CocoRoot</title>
    <link rel="stylesheet" href="../css/cocoroot.css">
</head>

<body class="auth-page">
    <div class="auth-img">
        <a href="welcomeScreen.html" class="auth-back" aria-label="Voltar">&#8249;</a>
    </div>

    <div class="auth-form">
        <div class="auth-form-card">
            <div class="auth-form-header">
                <img src="../image/logo.jpeg" alt="CocoRoot" class="auth-brand">
                <h1 class="auth-form-title">Entrar</h1>
                <p class="auth-form-subtitle">Aceda a sua conta e acompanhe os seus cultivos.</p>
            </div>

            <form id="login-form" action="../../Back-end/login.php" method="POST">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite o seu e-mail" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                    <button type="button" id="toggle-login-password" class="btn"
                        style="margin-top:10px;padding:10px 14px;width:100%;">Mostrar senha</button>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn full">Entrar</button>
                    <a href="registo.html" class="btn outline full">Registar-me</a>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script>
        const loginPasswordInput = document.getElementById('password');
        const toggleLoginPasswordBtn = document.getElementById('toggle-login-password');
        if (toggleLoginPasswordBtn && loginPasswordInput) {
            toggleLoginPasswordBtn.addEventListener('click', () => {
                const isHidden = loginPasswordInput.type === 'password';
                loginPasswordInput.type = isHidden ? 'text' : 'password';
                toggleLoginPasswordBtn.textContent = isHidden ? 'Ocultar senha' : 'Mostrar senha';
            });
        }

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const endpoint = window.CocoRootApi
                ? window.CocoRootApi.buildPhpUrl('login.php')
                : new URL('../../Back-end/login.php', window.location.href).toString();

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                // ... (rest of the logic)
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message || 'Erro ao entrar.');
                }
            } catch (err) {
                alert('Erro de ligação ao servidor.');
            }
        });
    </script>
</body>

</html>
