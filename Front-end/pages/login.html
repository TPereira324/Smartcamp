<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CocoRoot</title>
    <link rel="stylesheet" href="../css/cocoroot.css">
</head>

<body class="auth-page">
    <div class="auth-img">
        <a href="welcomeScreen.html" class="auth-back" aria-label="Voltar"><i class="bi bi-chevron-left"
                aria-hidden="true"></i></a>
    </div>

    <div class="auth-form">
        <div class="auth-form-card">
            <div class="auth-form-header">
                <img src="../image/logo.jpeg" alt="CocoRoot" class="auth-brand">
            </div>

            <form id="login-form" action="#" method="POST">
                <div class="form-group">
                    <label for="email">Digite o seu e-mail</label>
                    <input type="email" id="email" name="email" placeholder="Ex: maria123@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Digite a sua palavra-passe</label>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password" placeholder="********" required>
                        <button type="button" id="toggle-login-password" class="input-icon"
                            aria-label="Mostrar ou ocultar palavra-passe">
                            <i class="bi bi-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn full">Entrar</button>
                </div>
                <div class="auth-alt">
                    Ainda não tem conta? <a href="registo.html">Registar-me</a>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/utils/config.js"></script>
    <script src="../js/utils/api.js"></script>
    <script src="../js/views/layout.js"></script>
    <script>
        const loginPasswordInput = document.getElementById('password');
        const toggleLoginPasswordBtn = document.getElementById('toggle-login-password');
        const toggleLoginPasswordIcon = toggleLoginPasswordBtn ? toggleLoginPasswordBtn.querySelector('i') : null;
        if (toggleLoginPasswordBtn && loginPasswordInput) {
            toggleLoginPasswordBtn.addEventListener('click', () => {
                const isHidden = loginPasswordInput.type === 'password';
                loginPasswordInput.type = isHidden ? 'text' : 'password';
                if (toggleLoginPasswordIcon) {
                    toggleLoginPasswordIcon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
                }
            });
        }

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const form = document.getElementById('login-form');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const endpoint = window.CocoRootApi
                ? window.CocoRootApi.buildBackendUrl('usuarios/login')
                : new URL('usuarios/login', window.CocoRootConfig?.apiBaseUrl || new URL('api.php/', new URL('../Back-end/', window.location.href))).toString();

            if (form) {
                form.action = endpoint;
            }

            try {
                const data = window.CocoRootApi && typeof window.CocoRootApi.fetchJson === 'function'
                    ? await window.CocoRootApi.fetchJson('usuarios/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    })
                    : await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    }).then((response) => response.json());

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message || 'Erro ao entrar.');
                }
            } catch (err) {
                alert(err?.message || 'Erro de ligação ao servidor.');
            }
        });
    </script>
</body>

</html>
