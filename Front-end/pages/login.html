<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CocoRoot</title>
    <link rel="stylesheet" href="../css/wireframe.css">
</head>

<body class="auth-page">
    <div class="auth-img img-ph" style="overflow:hidden;padding:0;">

    </div>

    <div class="auth-form">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;">
            <a href="principal.html" class="back-link">← Home</a>
            <a href="registo.html" class="nav-btn">Criar Conta</a>
        </div>

        <div class="auth-logo">
            <span style="display:flex;align-items:center;gap:10px;">

                <span>CocoRoot</span>
            </span>
        </div>

        <form id="login-form" action="../../Back-end/login.php" method="POST">
            <div class="form-group">
                <label for="email">Nome e e-mail</label>
                <input type="email" id="email" name="email" placeholder="Digite o seu nome e e-mail" required>
            </div>
            <div class="form-group">
                <label for="password">Palavra-passe</label>
                <input type="password" id="password" name="password" placeholder="Digite a sua palavra-passe" required>
                <button type="button" id="toggle-login-password" class="btn"
                    style="margin-top:10px;padding:10px 14px;width:100%;">Mostrar palavra-passe</button>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn full">Entrar</button>
                <a href="registo.html" class="btn full">Registar-me</a>
            </div>
        </form>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script>
        const loginPasswordInput = document.getElementById('password');
        const toggleLoginPasswordBtn = document.getElementById('toggle-login-password');
        if (toggleLoginPasswordBtn && loginPasswordInput) {
            toggleLoginPasswordBtn.addEventListener('click', () => {
                const isHidden = loginPasswordInput.type === 'password';
                loginPasswordInput.type = isHidden ? 'text' : 'password';
                toggleLoginPasswordBtn.textContent = isHidden ? 'Ocultar palavra-passe' : 'Mostrar palavra-passe';
            });
        }

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const endpoint = window.CocoRootApi
                ? window.CocoRootApi.buildPhpUrl('login.php')
                : new URL('../../Back-end/login.php', window.location.href).toString();

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                // ... (rest of the logic)
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message || 'Erro ao entrar.');
                }
            } catch (err) {
                alert('Erro de ligação ao servidor.');
            }
        });
    </script>
</body>

</html>
