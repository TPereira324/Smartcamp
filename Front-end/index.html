<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CocoRoot - Início</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha384-+ZkQdZ5l9QyCkzqg2eXfS6jZVnQmQO3ZC7pCkHn+L5qZf2mY0Gv3vYVxwT3q3Q8VZ" crossorigin="anonymous">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app" class="welcome-page">
        <div class="welcome-container">
            <div class="welcome-image">
                <img src="image/Coco.jpeg" alt="Coconuts">
            </div>
            <div class="welcome-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <img src="image/logo.jpeg" alt="CocoRoot Logo">
                    </div>
                    <h1 class="brand-name">CocoRoot</h1>
                    <p class="slogan">Gestão inteligente para os seus cultivos</p>
                </div>

                <ul class="features-list">
                    <li>Monitorize as suas culturas em tempo real</li>
                    <li>Receba alertas e dicas personalizadas</li>
                    <li>Aprenda com outros agricultores</li>
                </ul>

                <div class="button-group">
                    <button class="btn-primary" onclick="location.href='pages/login.html'">Entrar</button>
                    <button class="btn-secondary" onclick="location.href='pages/registo.html'">Registar-me</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MVC Structure -->
    <script src="js/models/utilizadorModel.js"></script>
    <script src="js/views/utilizadorView.js"></script>
    <script src="js/controllers/utilizadorController.js"></script>
    <script src="js/load.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-pQ5Qw6VxqVqgk3WcJm0gTkdGqKk0wQfJv3+JxQjI9KQ1vk3oW1a1Yp0l9jVw8wB9"
        crossorigin="anonymous"></script>
</body>

</html>
